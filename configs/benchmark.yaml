version: 3.0.0
protocol_version: AIB-0.3.0
pricing_config_path: configs/pricing.yaml
default_scenario: v0_2_hunt
max_turns: 50
invalid_action_policy: waste_turn

observation:
  history_window: 1
  discovery_window: 10
  path_window: 10

parser:
  case_mode: case_insensitive

logging:
  log_full_prompts: true
  logs_dir: artifacts/logs
  results_dir: artifacts/results
  replays_dir: artifacts/replays

metrics:
  usage_fallback: null

rules:
  energy_max: 140
  hunger_max: 100
  thirst_max: 100
  start_energy: 120
  start_hunger: 20
  start_thirst: 20
  passive_energy_loss: 2
  passive_hunger_gain: 4
  passive_thirst_gain: 5
  starvation_energy_penalty: 8
  dehydration_energy_penalty: 10
  rest_energy_gain: 12
  eat_hunger_reduction: 25
  drink_thirst_reduction: 25
  attack_damage: 3
  attack_energy_cost: 2
  npc_counter_damage: 3
  npc_start_hp: 6
  npc_drop_food: 1

scoring:
  survive_turn: 1
  gather_useful: 3
  consume_useful: 2
  invalid_action: -2
  death: -10
